/* =======================================================
   Render.com — deployment configuration
   Docs: https://render.com/docs/render-yaml
   ======================================================= */

services:
  # ── Backend (Node.js / Express) ─────────────────────────
  - type: web
    name: barakahx-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false          # e.g. https://barakahx.onrender.com

  # ── Frontend (React / Vite → static site) ───────────────
  - type: web
    name: barakahx
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
