# =======================================================
# Render.com - deployment configuration
# Docs: https://render.com/docs/render-yaml
# =======================================================

services:
  # ── Backend (Node.js / Express) ─────────────────────────
  - type: web
    name: barakahx-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # set to your MongoDB Atlas URI in Render dashboard
      - key: JWT_SECRET
        sync: false          # set a strong random secret in Render dashboard
      - key: ADMIN_EMAIL
        sync: false          # e.g. admin@barakahx.com
      - key: ADMIN_PASSWORD
        sync: false          # strong admin password
      - key: FRONTEND_URL
        value: https://barakahx.onrender.com

  # ── Frontend (React / Vite → static site) ───────────────
  - type: web
    name: barakahx
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://barakahx-api.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
